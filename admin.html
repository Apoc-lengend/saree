<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parinay Saree - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div id="toast">Changes Saved Successfully!</div>

    <!-- Login Auth Screen -->
    <div class="auth-wrapper" id="auth-screen">
        <div class="auth-card">
            <h2>Admin Login</h2>
            <p style="text-align:center;font-size:0.9rem;margin-bottom:2rem;color:#777;">Powered by GitHub Pages API</p>
            <div class="form-group">
                <label>GitHub Username</label>
                <input type="text" id="github-username" placeholder="e.g. aditi-textiles">
            </div>
            <div class="form-group">
                <label>Repository Name</label>
                <input type="text" id="github-repo" placeholder="e.g. saree-website">
            </div>
            <div class="form-group">
                <label>Personal Access Token (PAT)</label>
                <input type="password" id="github-token" placeholder="ghp_xxxxxxxxxxxxxxx">
            </div>
            <button class="btn" onclick="app.login()">Connect to Repository</button>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div class="container dashboard" id="dashboard-screen">
        <div class="header-bar">
            <div>
                <h1 style="margin:0;color:var(--primary);">Parinay Saree Admin Dashboard</h1>
                <p style="margin:0.2rem 0;color:var(--second);">Editing <span id="repo-display"></span></p>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;">
                <button class="btn btn-small" onclick="window.open('index.html', '_blank')"
                    style="background:#f0f0f0; color:#333; border: 1px solid #ccc; font-weight: bold;"
                    title="Open live website in new tab">
                    🌐 Live Site
                </button>
                <button class="btn btn-small" onclick="app.openTranslationsModal()"
                    style="background:#5a67d8;"
                    title="Manage dual-language dictionary">
                    🌍 Translations
                </button>
                <button class="btn btn-small" onclick="app.previewChanges()"
                    style="background:#276749;"
                    title="Preview your current edits on the live pages before committing">
                    👁 Preview Changes
                </button>
                <button class="btn btn-small" onclick="app.cleanupOrphanImages()"
                    style="background:#975a16;"
                    title="Scan GitHub for uploaded images not referenced by any product">
                    🧹 Cleanup Images
                </button>
                <button class="btn btn-small" onclick="app.exportProductList()"
                    style="background:#4a5568;"
                    title="Export the currently viewed product list as a PDF">
                    📄 Export PDF
                </button>
                <button class="btn btn-small" onclick="app.saveChanges()">Commit Changes to GitHub</button>
            </div>
        </div>

        <!-- Cover Photos Config -->
        <!-- Native Metric Dashboard Overlay -->
        <div class="panel" style="background:#f4f6f8; border-left:4px solid #7B1338; margin-bottom:20px;">
            <div id="metric-dashboard" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:15px;">
                <!-- Populated by JS -->
            </div>
        </div>

        <div class="panel">
            <h3>Website Cover Photos</h3>
            <div class="grid-2">
                <div class="form-group">
                    <label id="cfg-hero-label" for="cfg-hero-cover" style="display:block; padding:8px 12px; background:#f0f0f0; border-radius:4px; font-weight:bold; cursor:pointer;">📁 Hero Cover</label>
                    <input type="file" id="cfg-hero-cover" style="display:none;" accept="image/*" onchange="app.uploadConfigImage('hero_cover', this.files[0], 'cfg-hero-label')">
                    <input type="text" id="cfg-hero-title" placeholder="Hero Title" style="width:100%; margin-top:5px; padding:6px; font-size:0.8rem; border:1px solid #ccc; border-radius:4px;" onchange="app.updateConfig('hero_title', this.value)">
                    <textarea id="cfg-hero-subtitle" placeholder="Hero Subtitle" rows="2" style="width:100%; margin-top:5px; padding:6px; font-size:0.8rem; border:1px solid #ccc; border-radius:4px;" onchange="app.updateConfig('hero_subtitle', this.value)"></textarea>
                </div>
                <div class="form-group">
                    <label id="cfg-sarees-label" for="cfg-sarees-cover" style="display:block; padding:8px 12px; background:#f0f0f0; border-radius:4px; font-weight:bold; cursor:pointer;">📁 Saree Cover</label>
                    <input type="file" id="cfg-sarees-cover" style="display:none;" accept="image/*" onchange="app.uploadConfigImage('sarees_cover', this.files[0], 'cfg-sarees-label')">
                    <input type="text" id="cfg-sarees-title" placeholder="Sarees Title" style="width:100%; margin-top:5px; padding:6px; font-size:0.8rem; border:1px solid #ccc; border-radius:4px;" onchange="app.updateConfig('sarees_title', this.value)">
                    <textarea id="cfg-sarees-subtitle" placeholder="Sarees Subtitle" rows="2" style="width:100%; margin-top:5px; padding:6px; font-size:0.8rem; border:1px solid #ccc; border-radius:4px;" onchange="app.updateConfig('sarees_subtitle', this.value)"></textarea>
                </div>
                <div class="form-group">
                    <label id="cfg-bed-label" for="cfg-bedsheets-cover" style="display:block; padding:8px 12px; background:#f0f0f0; border-radius:4px; font-weight:bold; cursor:pointer;">📁 Bedsheet Cover</label>
                    <input type="file" id="cfg-bedsheets-cover" style="display:none;" accept="image/*" onchange="app.uploadConfigImage('bedsheets_cover', this.files[0], 'cfg-bed-label')">
                    <input type="text" id="cfg-bedsheets-title" placeholder="Bedsheets Title" style="width:100%; margin-top:5px; padding:6px; font-size:0.8rem; border:1px solid #ccc; border-radius:4px;" onchange="app.updateConfig('bedsheets_title', this.value)">
                    <textarea id="cfg-bedsheets-subtitle" placeholder="Bedsheets Subtitle" rows="2" style="width:100%; margin-top:5px; padding:6px; font-size:0.8rem; border:1px solid #ccc; border-radius:4px;" onchange="app.updateConfig('bedsheets_subtitle', this.value)"></textarea>
                </div>
                <div class="form-group">
                    <label id="cfg-home-sarees-label" for="cfg-home-sarees-cover" style="display:block; padding:8px 12px; background:#f0f0f0; border-radius:4px; font-weight:bold; cursor:pointer;">📁 Hero Saree Cover</label>
                    <input type="file" id="cfg-home-sarees-cover" style="display:none;" accept="image/*" onchange="app.uploadConfigImage('home_sarees_cover', this.files[0], 'cfg-home-sarees-label')">
                    <input type="text" id="cfg-home-sarees-title" placeholder="Hero Saree Title" style="width:100%; margin-top:5px; padding:6px; font-size:0.8rem; border:1px solid #ccc; border-radius:4px;" onchange="app.updateConfig('home_sarees_title', this.value)">
                    <textarea id="cfg-home-sarees-subtitle" placeholder="Hero Saree Subtitle" rows="2" style="width:100%; margin-top:5px; padding:6px; font-size:0.8rem; border:1px solid #ccc; border-radius:4px;" onchange="app.updateConfig('home_sarees_subtitle', this.value)"></textarea>
                </div>
                <div class="form-group">
                    <label id="cfg-home-bedsheets-label" for="cfg-home-bedsheets-cover" style="display:block; padding:8px 12px; background:#f0f0f0; border-radius:4px; font-weight:bold; cursor:pointer;">📁 Hero Bedsheet Cover</label>
                    <input type="file" id="cfg-home-bedsheets-cover" style="display:none;" accept="image/*" onchange="app.uploadConfigImage('home_bedsheets_cover', this.files[0], 'cfg-home-bedsheets-label')">
                    <input type="text" id="cfg-home-bedsheets-title" placeholder="Hero Bedsheet Title" style="width:100%; margin-top:5px; padding:6px; font-size:0.8rem; border:1px solid #ccc; border-radius:4px;" onchange="app.updateConfig('home_bedsheets_title', this.value)">
                    <textarea id="cfg-home-bedsheets-subtitle" placeholder="Hero Bedsheet Subtitle" rows="2" style="width:100%; margin-top:5px; padding:6px; font-size:0.8rem; border:1px solid #ccc; border-radius:4px;" onchange="app.updateConfig('home_bedsheets_subtitle', this.value)"></textarea>
                </div>
                <div class="form-group">
                    <label id="cfg-lehenga-label" for="cfg-lehenga-cover" style="display:block; padding:8px 12px; background:#f0f0f0; border-radius:4px; font-weight:bold; cursor:pointer;">📁 Lehenga Cover</label>
                    <input type="file" id="cfg-lehenga-cover" style="display:none;" accept="image/*" onchange="app.uploadConfigImage('lehenga_cover', this.files[0], 'cfg-lehenga-label')">
                    <input type="text" id="cfg-lehenga-title" placeholder="Lehenga Title" style="width:100%; margin-top:5px; padding:6px; font-size:0.8rem; border:1px solid #ccc; border-radius:4px;" onchange="app.updateConfig('lehenga_title', this.value)">
                    <textarea id="cfg-lehenga-subtitle" placeholder="Lehenga Subtitle" rows="2" style="width:100%; margin-top:5px; padding:6px; font-size:0.8rem; border:1px solid #ccc; border-radius:4px;" onchange="app.updateConfig('lehenga_subtitle', this.value)"></textarea>
                </div>
                <div class="form-group">
                    <label id="cfg-home-lehenga-label" for="cfg-home-lehenga-cover" style="display:block; padding:8px 12px; background:#f0f0f0; border-radius:4px; font-weight:bold; cursor:pointer;">📁 Hero Lehenga Cover</label>
                    <input type="file" id="cfg-home-lehenga-cover" style="display:none;" accept="image/*" onchange="app.uploadConfigImage('home_lehenga_cover', this.files[0], 'cfg-home-lehenga-label')">
                    <input type="text" id="cfg-home-lehenga-title" placeholder="Hero Lehenga Title" style="width:100%; margin-top:5px; padding:6px; font-size:0.8rem; border:1px solid #ccc; border-radius:4px;" onchange="app.updateConfig('home_lehenga_title', this.value)">
                    <textarea id="cfg-home-lehenga-subtitle" placeholder="Hero Lehenga Subtitle" rows="2" style="width:100%; margin-top:5px; padding:6px; font-size:0.8rem; border:1px solid #ccc; border-radius:4px;" onchange="app.updateConfig('home_lehenga_subtitle', this.value)"></textarea>
                </div>
                <div class="form-group">
                    <label>Delivery Rate</label>
                    <input type="text" id="cfg-delivery-value" placeholder="e.g. Free Delivery or 50" onchange="app.updateConfig('delivery_value', this.value)">
                </div>
                <div class="form-group">
                    <label>WhatsApp Number</label>
                    <input type="text" id="cfg-whatsapp" placeholder="e.g. 919876543210" onchange="app.updateConfig('whatsapp_number', this.value)">
                </div>
            </div>
        </div>

        <div class="panel">
            <h3>About Section Text</h3>
            <div class="form-group">
                <label>About Title & Subtitle</label>
                <div style="display:flex; gap:10px; margin-top:5px;">
                    <input type="text" id="cfg-about-title" placeholder="Title (e.g. Why Choose Us)" style="flex:1; padding:6px; font-size:0.8rem; border:1px solid #ccc; border-radius:4px;" onchange="app.updateConfig('about_title', this.value)">
                    <input type="text" id="cfg-about-subtitle" placeholder="Subtitle" style="flex:1; padding:6px; font-size:0.8rem; border:1px solid #ccc; border-radius:4px;" onchange="app.updateConfig('about_subtitle', this.value)">
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Feature 1</label>
                    <input type="text" id="cfg-about-f1-title" placeholder="Feature 1 Title" style="width:100%; margin-top:5px; padding:6px; font-size:0.8rem; border:1px solid #ccc; border-radius:4px;" onchange="app.updateConfig('about_f1_title', this.value)">
                    <textarea id="cfg-about-f1-desc" placeholder="Feature 1 Description" rows="3" style="width:100%; margin-top:5px; padding:6px; font-size:0.8rem; border:1px solid #ccc; border-radius:4px;" onchange="app.updateConfig('about_f1_desc', this.value)"></textarea>
                </div>
                <div class="form-group">
                    <label>Feature 2</label>
                    <input type="text" id="cfg-about-f2-title" placeholder="Feature 2 Title" style="width:100%; margin-top:5px; padding:6px; font-size:0.8rem; border:1px solid #ccc; border-radius:4px;" onchange="app.updateConfig('about_f2_title', this.value)">
                    <textarea id="cfg-about-f2-desc" placeholder="Feature 2 Description" rows="3" style="width:100%; margin-top:5px; padding:6px; font-size:0.8rem; border:1px solid #ccc; border-radius:4px;" onchange="app.updateConfig('about_f2_desc', this.value)"></textarea>
                </div>
                <div class="form-group">
                    <label>Feature 3</label>
                    <input type="text" id="cfg-about-f3-title" placeholder="Feature 3 Title" style="width:100%; margin-top:5px; padding:6px; font-size:0.8rem; border:1px solid #ccc; border-radius:4px;" onchange="app.updateConfig('about_f3_title', this.value)">
                    <textarea id="cfg-about-f3-desc" placeholder="Feature 3 Description" rows="3" style="width:100%; margin-top:5px; padding:6px; font-size:0.8rem; border:1px solid #ccc; border-radius:4px;" onchange="app.updateConfig('about_f3_desc', this.value)"></textarea>
                </div>
            </div>
        </div>

        <div class="grid-2">
            <!-- Add New Product Form -->
            <div class="panel">
                <h3>Add New Product</h3>
                <div class="form-group">
                    <label>Category</label>
                    <select id="add-category">
                        <option value="sarees">Sarees</option>
                        <option value="bedsheets">Bedsheets</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="add-name" placeholder="e.g. Silk Saree">
                </div>
                <div class="form-group">
                    <label>Price</label>
                    <input type="text" id="add-price" placeholder="e.g. 1200">
                </div>
                <div class="form-group">
                    <label>Stock Quantity</label>
                    <input type="number" id="add-stock" placeholder="e.g. 10" value="1">
                </div>
                <div class="form-group">
                    <label>Discount (%)</label>
                    <input type="number" id="add-discount" placeholder="e.g. 15 (leave 0 if none)" value="0">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <div style="display:flex; gap:15px; margin-top:5px; font-size:0.9rem;">
                        <label><input type="radio" name="add-status" value="live" checked> 🟢 Live</label>
                        <label><input type="radio" name="add-status" value="hidden"> 🟡 Hidden</label>
                        <label><input type="radio" name="add-status" value="archived"> 🔴 Archived</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Badge Label</label>
                    <select id="add-badge">
                        <option value="">None</option>
                        <option value="new">🟢 New</option>
                        <option value="sale">🔴 Sale</option>
                        <option value="trending">🟣 Trending</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Front Image</label>
                    <input type="file" id="add-image" accept="image/*" style="display:none;" onchange="document.getElementById('add-image-label').innerText = this.files[0] ? this.files[0].name : 'Upload Front Image'">
                    <label for="add-image" id="add-image-label" style="display:block; background:#f9f9f9; padding:12px; text-align:center; border:2px dashed #ccc; border-radius:6px; cursor:pointer; font-weight:bold; color:#555;">📁 Upload Front Image</label>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="add-desc" placeholder="Product description..."></textarea>
                </div>
                <div class="form-group">
                    <label>More Images (Select Multiple)</label>
                    <input type="file" id="add-more-images" multiple accept="image/*" style="display:none;" onchange="document.getElementById('add-more-label').innerText = this.files.length + ' extra image(s) selected'">
                    <label for="add-more-images" id="add-more-label" style="display:block; background:#f9f9f9; padding:12px; text-align:center; border:2px dashed #ccc; border-radius:6px; cursor:pointer; font-weight:bold; color:#555;">🖼️ Upload Extra Images</label>
                </div>
                <button class="btn btn-small" onclick="app.addProduct()">Add Product</button>
            </div>

            <!-- Product Manager -->
            <div class="panel">
                <h3>Manage Products</h3>
                <div class="form-group" style="display:flex; gap:10px; align-items:center; margin-bottom: 10px;">
                    <select id="manage-category" onchange="app.resetAndRender()" style="flex:1;">
                        <option value="sarees">View Sarees</option>
                        <option value="bedsheets">View Bedsheets</option>
                        <option value="lehenga">View Lehengas</option>
                    </select>
                    <button class="btn btn-small" onclick="app.openPreferencesModal()" style="padding:10px; background:#4a5568; margin-top:0;">Preference</button>
                </div>

                <div style="display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap;">
                    <div style="flex: 2; position: relative;">
                        <span style="position: absolute; left: 10px; top: 10px; color: #888;">🔍</span>
                        <input type="text" id="manage-search" placeholder="Search by product name..." oninput="app.renderProducts()" style="width: 100%; padding: 10px 10px 10px 32px; border:1px solid #ccc; border-radius:4px; box-sizing: border-box; font-size: 0.9rem;">
                    </div>
                    <select id="manage-sort" onchange="app.renderProducts()" style="flex: 1; padding: 10px; border:1px solid #ccc; border-radius:4px; font-size: 0.9rem;">
                        <option value="default">Sort: Default Order</option>
                        <option value="newest">Sort: Recently Added First</option>
                        <option value="oldest">Sort: Oldest First</option>
                    </select>
                </div>

                <!-- Status Filter Tabs -->
                <div id="status-tabs" style="display:flex; gap:0; margin-bottom:12px; border-radius:6px; overflow:hidden; border:1px solid #ddd;">
                    <button onclick="app.setStatusTab('all')" data-tab="all"
                        style="flex:1; padding:8px 4px; border:none; cursor:pointer; font-size:0.8rem; font-weight:700;
                               background:#7B1338; color:white; border-right:1px solid rgba(255,255,255,0.2);">
                        All <span id="tab-count-all" style="font-weight:400;font-size:0.75rem;opacity:0.85;"></span>
                    </button>
                    <button onclick="app.setStatusTab('live')" data-tab="live"
                        style="flex:1; padding:8px 4px; border:none; cursor:pointer; font-size:0.8rem; font-weight:700;
                               background:#f0f0f0; color:#444; border-right:1px solid #ddd;">
                        🟢 Live <span id="tab-count-live" style="font-weight:400;font-size:0.75rem;"></span>
                    </button>
                    <button onclick="app.setStatusTab('hidden')" data-tab="hidden"
                        style="flex:1; padding:8px 4px; border:none; cursor:pointer; font-size:0.8rem; font-weight:700;
                               background:#f0f0f0; color:#444; border-right:1px solid #ddd;">
                        🟡 Hidden <span id="tab-count-hidden" style="font-weight:400;font-size:0.75rem;"></span>
                    </button>
                    <button onclick="app.setStatusTab('archived')" data-tab="archived"
                        style="flex:1; padding:8px 4px; border:none; cursor:pointer; font-size:0.8rem; font-weight:700;
                               background:#f0f0f0; color:#444;">
                        🔴 Archived <span id="tab-count-archived" style="font-weight:400;font-size:0.75rem;"></span>
                    </button>
                </div>

                <div style="display:flex; gap:10px; margin-bottom:15px; background:#f9f9f9; padding:10px; border-radius:4px; border:1px solid #ddd; align-items:center; flex-wrap:wrap;">
                    <label style="display:flex;align-items:center;gap:6px;font-size:0.82rem;font-weight:700;cursor:pointer;">
                        <input type="checkbox" id="bulk-select-all" onchange="app.toggleBulkSelectAll(this.checked)"> Select All
                    </label>
                    <select id="bulk-action" style="padding:6px;flex:1;font-size:0.8rem;border-radius:4px;min-width:170px;margin-left:auto;border:1px solid #ccc;">
                        <option value="">── Bulk Actions ──</option>
                        <optgroup label="Visibility">
                            <option value="set_live">🟢 Set Status: Live</option>
                            <option value="set_hidden">🟡 Set Status: Hidden</option>
                            <option value="set_archived">🔴 Set Status: Archived</option>
                        </optgroup>
                        <optgroup label="Discounts">
                            <option value="discount_10">🏷 Apply 10% Discount</option>
                            <option value="discount_20">🏷 Apply 20% Discount</option>
                            <option value="discount_25">🏷 Apply 25% Discount</option>
                            <option value="discount_50">🏷 Apply 50% Discount</option>
                            <option value="remove_discount">✖ Remove Discount</option>
                        </optgroup>
                        <optgroup label="Badges">
                            <option value="set_badge_new">🟢 Set Badge: New</option>
                            <option value="set_badge_sale">🔴 Set Badge: Sale</option>
                            <option value="set_badge_trending">🟣 Set Badge: Trending</option>
                            <option value="remove_badge">✖ Remove Badge</option>
                        </optgroup>
                        <optgroup label="Inventory">
                            <option value="set_stock_zero">📦 Mark Out of Stock (0)</option>
                        </optgroup>
                        <optgroup label="Danger">
                            <option value="delete">🗑 Bulk Delete</option>
                        </optgroup>
                    </select>
                    <button class="btn btn-small" onclick="app.executeBulkAction()" style="padding:6px 15px;margin-top:0;">Apply</button>
                </div>

                <div id="product-list" style="height: 750px; overflow-y: auto; padding-right:10px;">
                    <!-- Rendered by JS -->
                </div>
                <button id="load-more-btn" onclick="app.loadMoreProducts()" style="width:100%; padding:10px; margin-top:10px; background:#4a5568; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold; display:none;">Load Next 20 Products</button>
            </div>
        </div>
    </div>
    
    <script src="admin.js"></script>
</body>
</html>
