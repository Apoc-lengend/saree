<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parinay Saree - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div id="toast">Changes Saved Successfully!</div>

    <!-- Login Auth Screen -->
    <div class="auth-wrapper" id="auth-screen">
        <div class="auth-card">
            <h2>Admin Login</h2>
            <p style="text-align:center;font-size:0.9rem;margin-bottom:2rem;color:#777;">Powered by GitHub Pages API</p>
            <div class="form-group">
                <label>GitHub Username</label>
                <input type="text" id="github-username" placeholder="e.g. aditi-textiles">
            </div>
            <div class="form-group">
                <label>Repository Name</label>
                <input type="text" id="github-repo" placeholder="e.g. saree-website">
            </div>
            <div class="form-group">
                <label>Personal Access Token (PAT)</label>
                <input type="password" id="github-token" placeholder="ghp_xxxxxxxxxxxxxxx">
            </div>
            <button class="btn" onclick="app.login()">Connect to Repository</button>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div class="container dashboard" id="dashboard-screen">
        <div class="header-bar">
            <div>
                <h1 style="margin:0;color:var(--primary);">Parinay Saree Admin Dashboard</h1>
                <p style="margin:0.2rem 0;color:var(--second);">Editing <span id="repo-display"></span></p>
            </div>
            <button class="btn btn-small" onclick="app.saveChanges()">Commit Changes to GitHub</button>
        </div>

        <!-- Cover Photos Config -->
        <div class="panel">
            <h3>Website Cover Photos</h3>
            <div class="grid-2">
                <div class="form-group">
                    <label id="cfg-hero-label" for="cfg-hero-cover" style="display:inline-block; padding:8px 12px; background:#f0f0f0; border-radius:4px; font-weight:bold; cursor:pointer;">📁 Hero Cover</label>
                    <input type="file" id="cfg-hero-cover" style="display:none;" accept="image/*" onchange="app.uploadConfigImage('hero_cover', this.files[0], 'cfg-hero-label')">
                </div>
                <div class="form-group">
                    <label id="cfg-sarees-label" for="cfg-sarees-cover" style="display:inline-block; padding:8px 12px; background:#f0f0f0; border-radius:4px; font-weight:bold; cursor:pointer;">📁 Saree Cover</label>
                    <input type="file" id="cfg-sarees-cover" style="display:none;" accept="image/*" onchange="app.uploadConfigImage('sarees_cover', this.files[0], 'cfg-sarees-label')">
                </div>
                <div class="form-group">
                    <label id="cfg-bed-label" for="cfg-bedsheets-cover" style="display:inline-block; padding:8px 12px; background:#f0f0f0; border-radius:4px; font-weight:bold; cursor:pointer;">📁 Bedsheet Cover</label>
                    <input type="file" id="cfg-bedsheets-cover" style="display:none;" accept="image/*" onchange="app.uploadConfigImage('bedsheets_cover', this.files[0], 'cfg-bed-label')">
                </div>
                <div class="form-group">
                    <label>Delivery Rate</label>
                    <input type="text" id="cfg-delivery-value" placeholder="e.g. Free Delivery or 50" onchange="app.updateConfig('delivery_value', this.value)">
                </div>
                <div class="form-group">
                    <label>WhatsApp Number</label>
                    <input type="text" id="cfg-whatsapp" placeholder="e.g. 919876543210" onchange="app.updateConfig('whatsapp_number', this.value)">
                </div>
            </div>
        </div>

        <div class="grid-2">
            <!-- Add New Product Form -->
            <div class="panel">
                <h3>Add New Product</h3>
                <div class="form-group">
                    <label>Category</label>
                    <select id="add-category">
                        <option value="sarees">Sarees</option>
                        <option value="bedsheets">Bedsheets</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="add-name" placeholder="e.g. Silk Saree">
                </div>
                <div class="form-group">
                    <label>Price</label>
                    <input type="text" id="add-price" placeholder="e.g. 1200">
                </div>
                <div class="form-group">
                    <label>Stock Quantity</label>
                    <input type="number" id="add-stock" placeholder="e.g. 10" value="10">
                </div>
                <div class="form-group">
                    <label>Discount (%)</label>
                    <input type="number" id="add-discount" placeholder="e.g. 15 (leave 0 if none)" value="0">
                </div>
                <div class="form-group">
                    <label>Badge Label</label>
                    <select id="add-badge">
                        <option value="">None</option>
                        <option value="new">🟢 New</option>
                        <option value="sale">🔴 Sale</option>
                        <option value="trending">🟣 Trending</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Front Image</label>
                    <input type="file" id="add-image" accept="image/*" style="display:none;" onchange="document.getElementById('add-image-label').innerText = this.files[0] ? this.files[0].name : 'Upload Front Image'">
                    <label for="add-image" id="add-image-label" style="display:block; background:#f9f9f9; padding:12px; text-align:center; border:2px dashed #ccc; border-radius:6px; cursor:pointer; font-weight:bold; color:#555;">📁 Upload Front Image</label>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="add-desc" placeholder="Product description..."></textarea>
                </div>
                <div class="form-group">
                    <label>More Images (Select Multiple)</label>
                    <input type="file" id="add-more-images" multiple accept="image/*" style="display:none;" onchange="document.getElementById('add-more-label').innerText = this.files.length + ' extra image(s) selected'">
                    <label for="add-more-images" id="add-more-label" style="display:block; background:#f9f9f9; padding:12px; text-align:center; border:2px dashed #ccc; border-radius:6px; cursor:pointer; font-weight:bold; color:#555;">🖼️ Upload Extra Images</label>
                </div>
                <button class="btn btn-small" onclick="app.addProduct()">Add Product</button>
            </div>

            <!-- Product Manager -->
            <div class="panel">
                <h3>Manage Products</h3>
                <div class="form-group">
                    <select id="manage-category" onchange="app.renderProducts()">
                        <option value="sarees">View Sarees</option>
                        <option value="bedsheets">View Bedsheets</option>
                    </select>
                </div>
                <div id="product-list" style="max-height: 650px; overflow-y: auto; padding-right:10px;">
                    <!-- Rendered by JS -->
                </div>
            </div>
        </div>
    </div>
    
    <script src="admin.js"></script>
</body>
</html>
