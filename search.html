<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - Aditi Textiles</title>
    <meta name="description" content="Search results for Aditi Textiles products.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="components.js"></script>
    <script src="translations.js"></script>
    <script src="language.js"></script>
</head>
<body>
    <site-navbar></site-navbar>
    <section class="collections" style="padding-top: 6rem; padding-bottom: 4rem;">
        <div class="section-title" style="margin-bottom: 2rem;">
            <h2 id="search-heading">Search Results</h2>
            <p id="search-meta" style="color: var(--text-muted); margin-top: 0.5rem;"></p>
        </div>
        <div class="product-grid" id="search-grid"></div>
        <div id="no-results" style="display:none; text-align:center; padding: 4rem 1rem; color: var(--text-muted);">
            <p style="font-size: 1.2rem; margin-bottom: 1rem;">😕 No products found for your search.</p>
            <a href="collections.html" class="btn-primary">Browse All Collections</a>
        </div>
    </section>
    <script>
        function buildProductCard(product) {
            const discount = product.discount || 0;
            const stock = product.stock !== undefined ? product.stock : 10;
            const isOutOfStock = stock <= 0;
            const badge = product.badge || '';
            const priceNum = parseFloat(String(product.price).replace(/[^0-9.]/g, '')) || 0;
            let priceHTML = '';
            if (discount > 0) {
                const msrp = Math.round(priceNum / (1 - discount / 100));
                priceHTML = `<span class="original-price">₹${msrp.toLocaleString('en-IN')}</span><span class="selling-price">₹${priceNum.toLocaleString('en-IN')}</span>`;
            } else {
                priceHTML = `<span class="selling-price">${product.price}</span>`;
            }
            const leftBadge = discount > 0 ? `<div class="product-badge-wrap"><span class="badge-discount">${discount}% Off</span></div>` : '';
            const labelMap = { new: 'label-new', sale: 'label-sale', trending: 'label-trending' };
            const rightBadge = badge && labelMap[badge] ? `<span class="product-label-badge ${labelMap[badge]}">${badge}</span>` : '';
            const overlay = isOutOfStock ? '' : `<div class="product-card-overlay"><button onclick="addToCart('${product.name.replace(/'/g,"\\'")}', '${product.price}', '${product.image}')">Add to Cart</button></div>`;
            const card = document.createElement('div');
            card.className = 'product-card' + (isOutOfStock ? ' out-of-stock' : '');
            card.innerHTML = `<div class="product-card-img"><img src="${product.image}" alt="${product.name}" style="${product.style || ''}">${leftBadge}${rightBadge}${overlay}</div><div class="product-card-info"><h3 title="${product.name}">${product.name}</h3><div class="price-row">${priceHTML}</div></div>`;
            return card;
        }
        async function runSearch() {
            const params = new URLSearchParams(window.location.search);
            const query = (params.get('q') || '').trim().toLowerCase();
            const heading = document.getElementById('search-heading');
            const meta = document.getElementById('search-meta');
            const grid = document.getElementById('search-grid');
            const noResults = document.getElementById('no-results');
            if (!query) { heading.innerText = 'Search Products'; meta.innerText = 'Enter a term in the search box above.'; return; }
            heading.innerText = `Results for "${query}"`;
            try {
                const data = await (await fetch('data.json')).json();
                let matches = [];
                Object.keys(data.products).forEach(cat => {
                    data.products[cat].forEach(p => {
                        if (p.name.toLowerCase().includes(query) || cat.toLowerCase().includes(query)) matches.push(p);
                    });
                });
                grid.innerHTML = '';
                if (matches.length === 0) {
                    noResults.style.display = 'block';
                    meta.innerText = 'No products found.';
                } else {
                    meta.innerText = `${matches.length} product${matches.length > 1 ? 's' : ''} found`;
                    matches.forEach(p => grid.appendChild(buildProductCard(p)));
                }
            } catch (err) { meta.innerText = 'Could not load products. Please try again.'; }
        }
        document.addEventListener('DOMContentLoaded', runSearch);
    </script>
    <site-footer></site-footer>
</body>
</html>
