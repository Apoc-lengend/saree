<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bedsheets - Parinay Saree</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>.hero { height: 50vh; min-height: 350px; background-size: cover; background-position: center; }</style>
    <script src="components.js"></script>
    <script src="translations.js"></script>
    <script src="language.js"></script>
</head>
<body>
    <site-navbar></site-navbar>
    <header class="hero" id="dynamic-hero">
        <div class="hero-content">
            <h1 id="dynamic-title">Premium Bedsheets</h1>
            <p id="dynamic-subtitle">Loading...</p>
        </div>
    </header>
    <section class="collections" style="padding-top: 3rem; padding-bottom: 4rem;">
        <div class="product-grid" id="products-grid"></div>
    </section>
    <script>
        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                const hero = document.getElementById('dynamic-hero');
                hero.style.background = `linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)), url('${data.site_config.bedsheets_cover}') center/cover`;
                document.getElementById('dynamic-title').innerText = data.site_config.bedsheets_title;
                document.getElementById('dynamic-subtitle').innerText = data.site_config.bedsheets_subtitle;
                const grid = document.getElementById('products-grid');
                grid.innerHTML = '';
                data.products.bedsheets.forEach(product => grid.appendChild(buildProductCard(product)));
            } catch (error) { console.error('Error loading data:', error); }
        }
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
    <site-footer></site-footer>
</body>
</html>
