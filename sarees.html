<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarees - Aditi Textiles</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .hero { height: 50vh; min-height: 400px; background-size: cover; background-position: center; }
    </style>
    <script src="components.js"></script>
    <script src="translations.js"></script>
    <script src="language.js"></script>
</head>
<body>
    <site-navbar></site-navbar>
    <header class="hero" id="dynamic-hero">
        <div class="hero-content">
            <h1 id="dynamic-title">Designer Sarees</h1>
            <p id="dynamic-subtitle">Loading...</p>
        </div>
    </header>
    <section class="collections" style="padding-top: 4rem;">
        <div class="grid" id="products-grid">
            <!-- Products will be injected here by JS -->
        </div>
    </section>

    <script>
        async function loadData() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                
                // Update Config
                const hero = document.getElementById('dynamic-hero');
                hero.style.background = `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('${data.site_config.sarees_cover}') center/cover`;
                
                document.getElementById('dynamic-title').innerText = data.site_config.sarees_title;
                document.getElementById('dynamic-subtitle').innerText = data.site_config.sarees_subtitle;

                // Load Products
                const grid = document.getElementById('products-grid');
                grid.innerHTML = '';
                
                data.products.sarees.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="card-img-wrapper"><img src="${product.image}" alt="${product.name}" style="${product.style || ''}"></div>
                        <div class="card-info">
                            <h3>${product.name}</h3>
                            <p class="price">${product.price}</p>
                            <a href="javascript:void(0)" class="btn-secondary" onclick="addToCart('${product.name}', '${product.price}')">Add to Cart</a>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
    <site-footer></site-footer>
</body>
</html>
